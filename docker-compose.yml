# Solo Agent — one command to deploy the monitor + directive queue + Ralph loop.
#
# Usage:
#   docker compose up -d --build
#
# Then open http://localhost:8090
#
# Mounts:
#   - ./data        -> /data        SQLite metrics/state (persists across restarts)
#   - <workspace>   -> /state       the agent's shared state files (tasks.md, directives.md, ...)
#   - <target repo> -> /target      the repo the Ralph loop improves (read/write + git)
#
# All paths can be overridden via a .env file or environment variables.
services:
  solo-agent:
    build: .
    image: solo-agent:latest
    container_name: solo-agent
    ports:
      - "8090:8090"
    environment:
      # llama-server is reached via the Docker host (runs outside compose).
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL:-http://host.docker.internal:8080}
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - STATE_DIR=/state
      - DB_PATH=/data/solo-agent.db

      # Orchestrator config. Default improves solo-agent itself; point elsewhere
      # to improve a different product repo.
      - TARGET_REPO=${TARGET_REPO:-/target}
      - VERIFY_COMMAND=${VERIFY_COMMAND:-python -m pytest -q}
      - BASE_BRANCH=${BASE_BRANCH:-main}
      - WORK_BRANCH=${WORK_BRANCH:-solo-agent/auto}
      - AGENT_COMMAND=${AGENT_COMMAND:-opencode run --auto --format json --dir {repo} --session {session} --title {title} --model {model} "{prompt}"}
      - AGENT_MODEL=${AGENT_MODEL:-llama-local/qwen36-reap}

      # Budgets (tokens). Breach -> pause + alert.
      - CYCLE_TOKEN_BUDGET=${CYCLE_TOKEN_BUDGET:-200000}
      - DAILY_TOKEN_BUDGET=${DAILY_TOKEN_BUDGET:-2000000}

      # Don't auto-start the loop; start it from the dashboard.
      - AUTOSTART_ORCHESTRATOR=false
    volumes:
      - ./data:/data
      # The agent's workspace (tasks.md, journal.md, directives.md, plan.md, summaries/)
      - ${WORKSPACE_DIR:-./workspace}:/state
      # The repo the orchestrator improves. Defaults to solo-agent itself.
      - ${TARGET_REPO_HOST:-.}:/target
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
